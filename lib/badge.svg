<svg width="250" height="54" viewBox="0 0 250 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Left side text styles */
    .brand-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 10px; fill: #A1A1AA; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .dynamic-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; fill: #FFFFFF; font-weight: bold; }
    
    /* Right side metric styles */
    .metric-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 9px; fill: #A1A1AA; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .metric-value { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #00d82a; font-weight: bold; }
  </style>

  <rect width="250" height="54" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>

  <path d="M0 6C0 2.68629 2.68629 0 6 0H45V54H6C2.68629 54 0 51.3137 0 48V6Z" fill="#00d82a" fill-opacity="0.1"/>
  
  <image 
    href="data:image/png;base64," 
    x="7" 
    y="11" 
    height="32" 
    width="32" 
  />

  <text x="55" y="20" class="brand-text">Live on Bags.fm</text>
  <text x="55" y="40" class="dynamic-text">{{TOKEN_NAME}}</text>
  
  <text x="240" y="20" class="metric-label" text-anchor="end">MCAP</text>
  <text x="240" y="40" class="metric-value" text-anchor="end">{{METRIC_COUNT}}</text>
</svg>