<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bags.fm Badge Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎒</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --surface-color: rgba(24, 24, 27, 0.7);
            --surface-border: rgba(39, 39, 42, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-color: #00d82a;
            --accent-glow: rgba(0, 216, 42, 0.2);
            --input-bg: rgba(9, 9, 11, 0.5);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 216, 42, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            background-attachment: fixed;
            overflow-x: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: flex-start;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 400;
        }

        .card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: floatIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card:nth-child(2) {
            animation-delay: 0.1s;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        input, select, textarea {
            font-family: var(--font-body);
            background: var(--input-bg);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23a1a1aa%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
            padding-right: 2.5rem;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #d4d4d8;
        }

        .preview-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 2rem;
            min-height: 150px;
            border: 1px dashed var(--surface-border);
        }

        #badge-preview {
            max-width: 100%;
            height: auto;
            transition: opacity 0.3s ease;
        }

        .loading {
            opacity: 0.5;
            filter: grayscale(100%);
        }

        button {
            background: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        button.copied {
            background: var(--accent-color);
            color: #fff;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: -0.25rem;
            min-height: 1rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bags.fm Badge Generator</h1>
        <p class="subtitle">Showcase your token's market cap dynamically, anywhere.</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="form-group">
                <label for="addressInput">Token Address</label>
                <input 
                    type="text" 
                    id="addressInput" 
                    placeholder="e.g. ozDZyTuz9EvxBc8s9Huc8kCzCPcrQ1tCwJaQXMbBAGS"
                    value="ozDZyTuz9EvxBc8s9Huc8kCzCPcrQ1tCwJaQXMbBAGS"
                >
                <div id="errorText" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="themeInput">Badge Theme</label>
                <select id="themeInput">
                    <option value="dark">Dark Theme</option>
                    <option value="light">Light Theme</option>
                </select>
            </div>

            <button id="generateBtn" onclick="updateBadge()" style="width: 100%; margin-top: 0.5rem;">
                Generate Badge
            </button>
            
            <p style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5;">
                Enter a Solana token address. We'll automatically fetch the symbol and market cap, then generate your custom badge.
            </p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Live Preview</label>
                <div class="preview-container">
                    <img id="badge-preview" src="" alt="Badge Preview" />
                </div>
            </div>

            <div class="form-group">
                <label for="embedCode">HTML Embed Code</label>
                <textarea id="embedCode" readonly></textarea>
            </div>

            <button id="copyBtn" onclick="copyEmbedCode()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <span>Copy Code</span>
            </button>
        </div>
    </div>

    <div class="container" style="margin-top: 2rem; display: flex; justify-content: center; grid-template-columns: 1fr; width: 100%;">
        <a href="https://deforge.io" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
            <div class="card" style="display: flex; flex-direction: row; align-items: center; padding: 1.0rem 1.5rem; gap: 0.75rem; cursor: pointer; transition: all 0.2s ease; background: #ffffff; border: none;">
                <span style="font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; color: #18181b;">Build AI Agents with</span>
                <img src="deforge-white.svg" alt="Deforge Logo" style="height: 24px; filter: invert(1);" />
                <svg style="margin-left: 0.25rem; color: #18181b;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </div>
        </a>
    </div>

    <script>
        const addressInput = document.getElementById('addressInput');
        const themeInput = document.getElementById('themeInput');
        const badgePreview = document.getElementById('badge-preview');
        const embedCode = document.getElementById('embedCode');
        const errorText = document.getElementById('errorText');
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnText = copyBtn.querySelector('span');

        function updateBadge() {
            const address = addressInput.value.trim();
            const theme = themeInput.value;
            
            if (!address) {
                errorText.textContent = "Address is required.";
                badgePreview.src = "";
                embedCode.value = "";
                return;
            }

            errorText.textContent = "";
            badgePreview.classList.add('loading');

            const baseUrl = window.location.origin;
            const badgeUrl = `${baseUrl}/v1/badge.svg?address=${encodeURIComponent(address)}&theme=${theme}`;
            const targetUrl = `https://bags.fm/${encodeURIComponent(address)}`;

            fetch(badgeUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Could not load badge");
                    
                    badgePreview.src = badgeUrl;
                    badgePreview.classList.remove('loading');
                    
                    // Generate HTML snippet
                    const htmlSnippet = `<a href="${targetUrl}" target="_blank" rel="noopener noreferrer"><img alt="Live on Bags.fm" src="${badgeUrl}"></a>`;
                    embedCode.value = htmlSnippet;
                })
                .catch(err => {
                    badgePreview.src = "";
                    badgePreview.classList.remove('loading');
                    errorText.textContent = "Could not load badge for this address.";
                    embedCode.value = "";
                });
        }

        async function copyEmbedCode() {
            if (!embedCode.value) return;
            
            try {
                await navigator.clipboard.writeText(embedCode.value);
                copyBtn.classList.add('copied');
                copyBtnText.textContent = "Copied!";
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtnText.textContent = "Copy Code";
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
            }
        }

        window.addEventListener('DOMContentLoaded', updateBadge);
    </script>
</body>
</html>
